<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase History</title>

  <!-- Smartsupp Live Chat -->
  <script type="text/javascript">
    var _smartsupp = _smartsupp || {};
    _smartsupp.key = '744b225ede38a77e818e4ee93d85091e657ecafc';
    window.smartsupp || (function(d) {
      var s, c, o = smartsupp = function() { o._.push(arguments) };
      o._ = [];
      s = d.getElementsByTagName('script')[0];
      c = d.createElement('script');
      c.type = 'text/javascript';
      c.charset = 'utf-8';
      c.async = true;
      c.src = 'https://www.smartsuppchat.com/loader.js?';
      s.parentNode.insertBefore(c, s);
    })(document);
  </script>

  <style>
    :root {
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }
    .container { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0 50px; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn {
      border: 0; border-radius: 14px; padding: 12px 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-2)); color: white; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--line); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .history-list { display: grid; gap: 14px; margin-top: 18px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 18px; padding: 16px;
    }
    .history-item strong { display: block; margin-bottom: 5px; }
    .history-item span { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .amount {
      padding: 8px 12px; border-radius: 999px;
      background: rgba(22,163,74,.08); color: #166534;
      font-size: 12px; font-weight: 700;
      white-space: nowrap;
    }

    .msg {
      display: none; margin-top: 14px; padding: 12px 14px;
      border-radius: 14px; font-size: 14px;
    }
    .msg.error {
      display: block; color: #991b1b;
      background: rgba(220,38,38,.08);
      border: 1px solid rgba(220,38,38,.18);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <button class="btn btn-secondary" onclick="window.location.href='/dashboard.html'">Back to Dashboard</button>
      <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h1 style="margin-top:0;">Transaction History</h1>
      <p style="color:#64748b;">Review your wallet funding, balance changes, and card activity in one place.</p>

      <div id="historyMsg" class="msg"></div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function getToken() {
      return localStorage.getItem("mnbase_token");
    }

    function clearToken() {
      localStorage.removeItem("mnbase_token");
    }

    function logout() {
      clearToken();
      window.location.href = "/wallet.html";
    }

    function showMsg(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "msg error";
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(value || 0));
    }

    async function loadHistory() {
      const token = getToken();
      if (!token) {
        showMsg("historyMsg", "No active session found. Please log in again.");
        return;
      }

      try {
        const r = await fetch(`${API}/wallet/history`, {
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          }
        });

        const text = await r.text();

        if (!r.ok) {
          showMsg("historyMsg", text);
          return;
        }

        const data = JSON.parse(text);
        const list = document.getElementById("historyList");
        const txs = Array.isArray(data.transactions) ? data.transactions : [];

        if (!txs.length) {
          list.innerHTML = `
            <div class="history-item">
              <div>
                <strong>No history yet</strong>
                <span>Your wallet activity will appear here.</span>
              </div>
              <div class="amount">$0.00</div>
            </div>
          `;
          return;
        }

        list.innerHTML = txs.map((tx) => `
          <div class="history-item">
            <div>
              <strong>${tx.type || "Activity"}</strong>
              <span>${tx.message || ""}<br>${tx.createdAt || ""}</span>
            </div>
            <div class="amount">${formatMoney(tx.amount || 0)}</div>
          </div>
        `).join("");
      } catch (err) {
        showMsg("historyMsg", `Failed to load history: ${err.message}`);
      }
    }

    window.addEventListener("load", loadHistory);
  </script>
</body>
</html>

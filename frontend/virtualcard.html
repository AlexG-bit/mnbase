<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Virtual Card</title>
  <style>
    :root {
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }
    .container {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-2)); color: white; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--line); }

    .card-page {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 22px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .virtual-card {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      border-radius: 24px;
      padding: 26px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .virtual-card h2 { margin: 0; font-size: 28px; }
    .small { opacity: .85; font-size: 13px; }
    .card-balance { font-size: 34px; font-weight: 800; }
    .meta { color: var(--muted); line-height: 1.7; }
    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
    }
    .msg.error {
      display: block;
      color: #991b1b;
      background: rgba(220,38,38,.08);
      border: 1px solid rgba(220,38,38,.18);
    }
    @media (max-width: 900px) { .card-page { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <button class="btn btn-secondary" onclick="window.location.href='/dashboard.html'">Back to Dashboard</button>
      <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

    <div class="card-page">
      <div class="virtual-card">
        <div>
          <div class="small">MNBase Virtual Card</div>
          <h2 id="cardUser">User</h2>
        </div>

        <div>
          <div class="small">Card Balance</div>
          <div class="card-balance" id="cardBalance">$0.00</div>
        </div>

        <div class="small" id="cardStatus">Card status ready</div>
      </div>

      <div class="panel">
        <h2 style="margin-top:0;">Card overview</h2>
        <p class="meta">
          Your MNBase virtual card page displays activation status and card balance in a more professional, standard card-style layout.
        </p>

        <div class="meta" id="cardMeta">Waiting for card information...</div>
        <div id="cardMsg" class="msg"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function getToken() {
      return localStorage.getItem("mnbase_token");
    }

    function clearToken() {
      localStorage.removeItem("mnbase_token");
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(value || 0));
    }

    function showMsg(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "msg error";
    }

    function logout() {
      clearToken();
      window.location.href = "/wallet.html";
    }

    async function loadCard() {
      const token = getToken();
      if (!token) {
        showMsg("cardMsg", "No active session found. Please log in again.");
        return;
      }

      const r = await fetch(`${API}/wallet/me`, {
        method: "GET",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("cardMsg", `Card session error: ${text}`);
        return;
      }

      const data = JSON.parse(text);

      document.getElementById("cardUser").textContent = data.username || data.email || "User";
      document.getElementById("cardBalance").textContent = formatMoney(data.cardBalance || 0);
      document.getElementById("cardStatus").textContent =
        data.cardActivated ? "Card status: Active" : "Card status: Not activated";

      document.getElementById("cardMeta").textContent =
        data.cardActivated
          ? "Your card is active and ready for supported wallet-linked actions."
          : "Your card has not yet been activated. Please contact support or wait for admin activation.";
    }

    window.addEventListener("load", loadCard);
  </script>
</body>
</html>

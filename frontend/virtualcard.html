<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Virtual Card</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --green: #16a34a;
      --red: #dc2626;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }

    .container {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .back {
      color: var(--blue);
      font-weight: 600;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
    }

    .card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card {
      min-height: 260px;
      padding: 28px;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .chip {
      width: 52px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #facc15, #fde68a);
    }

    .card-number {
      font-size: 28px;
      letter-spacing: 3px;
      margin: 26px 0 10px;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      opacity: .94;
    }

    .panel {
      padding: 24px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .muted {
      color: var(--muted);
      line-height: 1.7;
    }

    .stat {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    .stat strong {
      display: block;
      margin-bottom: 6px;
    }

    .status-ok {
      color: #166534;
      font-weight: 700;
    }

    .status-bad {
      color: #991b1b;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="back" onclick="window.location.href='/dashboard.html'">← Back to Dashboard</div>
    </div>

    <div class="grid">
      <div class="card">
        <div>
          <div class="chip"></div>
          <div class="card-number">**** **** **** <span id="last4">2847</span></div>
        </div>

        <div class="card-meta">
          <div>
            <small>Card Holder</small><br />
            <strong id="holderName">MNBASE USER</strong>
          </div>
          <div>
            <small>Brand</small><br />
            <strong>MNBase Virtual Card</strong>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>Virtual Card</h2>
        <p class="muted">
          Your MNBase virtual card is designed to support a more complete fintech-style wallet experience.
        </p>

        <div class="stat">
          <strong>Card Status</strong>
          <span id="cardStatus">Loading...</span>
        </div>

        <div class="stat">
          <strong>Available Card Balance</strong>
          <span id="cardBalance">$0.00</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function getToken() {
      return localStorage.getItem("mnbase_token");
    }

    function formatMoney(value) {
      return `$${Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    }

    async function loadCard() {
      const token = getToken();

      if (!token) {
        window.location.href = "/wallet.html";
        return;
      }

      try {
        const r = await fetch(`${API}/wallet/card`, {
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          }
        });

        const text = await r.text();
        if (!r.ok) {
          window.location.href = "/wallet.html";
          return;
        }

        const data = JSON.parse(text);

        document.getElementById("holderName").textContent = data.holderName || "MNBASE USER";
        document.getElementById("last4").textContent = data.last4 || "2847";
        document.getElementById("cardBalance").textContent = formatMoney(data.usdBalance || 0);

        const statusEl = document.getElementById("cardStatus");
        if (data.cardActivated) {
          statusEl.textContent = "Activated";
          statusEl.className = "status-ok";
        } else {
          statusEl.textContent = "Not activated";
          statusEl.className = "status-bad";
        }
      } catch {
        window.location.href = "/wallet.html";
      }
    }

    window.addEventListener("load", loadCard);
  </script>
</body>
</html>

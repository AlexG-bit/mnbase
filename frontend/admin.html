<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Admin</title>
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:#0b1220;color:#fff}
    .wrap{width:min(900px,calc(100% - 32px));margin:40px auto}
    .card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px}
    input{width:100%;padding:14px;margin-bottom:12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:#0f172a;color:#fff}
    button{padding:14px 18px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer}
    .msg{margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>MNBase Admin</h1>
      <p style="color:#94a3b8">Separate admin access panel.</p>

      <input id="identifier" type="text" placeholder="Admin username or email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="adminLogin()">Login</button>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function show(text, ok=false){
      const el = document.getElementById("msg");
      el.style.color = ok ? "#16a34a" : "#dc2626";
      el.textContent = text;
    }

    async function adminLogin() {
      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value;

      try {
        const r = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identifier, password })
        });

        const text = await r.text();
        if (!r.ok) {
          show(text);
          return;
        }

        const data = JSON.parse(text);
        localStorage.setItem("mnbase_admin_token", data.token || "");
        show("Admin login successful.", true);
      } catch (err) {
        show(`Failed to fetch: ${err.message}`);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Admin</title>

  <!-- Smartsupp Live Chat -->
  <script type="text/javascript">
    var _smartsupp = _smartsupp || {};
    _smartsupp.key = '744b225ede38a77e818e4ee93d85091e657ecafc';

    window.smartsupp || (function(d) {
      var s, c, o = smartsupp = function() { o._.push(arguments) };
      o._ = [];
      s = d.getElementsByTagName('script')[0];
      c = d.createElement('script');
      c.type = 'text/javascript';
      c.charset = 'utf-8';
      c.async = true;
      c.src = 'https://www.smartsuppchat.com/loader.js?';
      s.parentNode.insertBefore(c, s);
    })(document);
  </script>
  <!-- End Smartsupp -->

  <style>
    :root {
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: linear-gradient(135deg, #1652f0, #2f6bff);
      color: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 45px rgba(22, 82, 240, 0.18);
    }

    .stat-card small {
      display: block;
      opacity: .9;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .stat-card h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -1px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 13px;
      font-weight: 500;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error {
      display: block;
      color: #991b1b;
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .18);
    }

    .msg.success {
      display: block;
      color: #166534;
      background: rgba(22, 163, 74, .08);
      border: 1px solid rgba(22, 163, 74, .18);
    }

    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="loginCard">
      <h1 style="margin-top:0;">MNBase Admin Session</h1>
      <p class="muted">Structured control center for users, balances, virtual card management, and system statistics.</p>

      <div class="field">
        <label for="adminIdentifier">Admin username or email</label>
        <input id="adminIdentifier" type="text" placeholder="admin or admin@mnbase.app" />
      </div>

      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" placeholder="Enter admin password" />
      </div>

      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <small>Total Users</small>
          <h2 id="totalUsers">0</h2>
        </div>
        <div class="stat-card">
          <small>Total Wallet Balance</small>
          <h2 id="totalBalance">$0.00</h2>
        </div>
        <div class="stat-card">
          <small>Total Transactions</small>
          <h2 id="totalTransactions">0</h2>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2 style="margin-top:0;">Fund wallet</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="fundIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Amount</label>
            <input id="fundAmount" type="number" />
          </div>
          <div class="field">
            <label>Activity Message</label>
            <textarea id="fundMessage" placeholder="Message the user will see in recent activity"></textarea>
          </div>
          <button class="btn btn-primary" onclick="fundWallet()">Fund Wallet</button>
          <div id="fundMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Remove balance</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="removeIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Amount</label>
            <input id="removeAmount" type="number" />
          </div>
          <div class="field">
            <label>Activity Message</label>
            <textarea id="removeMessage" placeholder="Message the user will see in recent activity"></textarea>
          </div>
          <button class="btn btn-primary" onclick="removeBalance()">Remove Balance</button>
          <div id="removeMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Activate card</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="activateIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Opening Card Balance</label>
            <input id="activateBalance" type="number" />
          </div>
          <button class="btn btn-primary" onclick="activateCard()">Activate Card</button>
          <div id="activateMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Deactivate card</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="deactivateIdentifier" type="text" />
          </div>
          <button class="btn btn-primary" onclick="deactivateCard()">Deactivate Card</button>
          <div id="deactivateMsg" class="msg"></div>
        </div>
      </div>

      <div class="card">
        <div class="top-row">
          <h2 style="margin:0;">Users</h2>
          <button class="btn btn-secondary" onclick="refreshAdminData()">Refresh All</button>
        </div>

        <div id="usersMsg" class="msg"></div>

        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Balance</th>
              <th>Card</th>
              <th>Card Balance</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function saveAdminToken(token) {
      localStorage.setItem("mnbase_admin_token", token);
    }

    function getAdminToken() {
      return localStorage.getItem("mnbase_admin_token");
    }

    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = ok ? "msg success" : "msg error";
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(value || 0));
    }

    async function adminLogin() {
      const identifier = document.getElementById("adminIdentifier").value.trim();
      const password = document.getElementById("adminPassword").value;

      const r = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier, password })
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("loginMsg", text);
        return;
      }

      const data = JSON.parse(text);
      saveAdminToken(data.token || "");

      if (typeof smartsupp === "function") {
        smartsupp("name", data.user?.username || "Admin");
        smartsupp("email", data.user?.email || "");
        smartsupp("variables", {
          Role: data.user?.role || "admin",
          Page: "Admin Panel"
        });
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
      refreshAdminData();
    }

    async function adminPost(path, body, msgId, successText) {
      const r = await fetch(`${API}${path}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getAdminToken()}`
        },
        body: JSON.stringify(body)
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg(msgId, text);
        return;
      }

      showMsg(msgId, successText, true);
      refreshAdminData();
    }

    function fundWallet() {
      adminPost("/admin/fund", {
        identifier: document.getElementById("fundIdentifier").value.trim(),
        amount: document.getElementById("fundAmount").value,
        message: document.getElementById("fundMessage").value.trim()
      }, "fundMsg", "Wallet funded successfully.");
    }

    function removeBalance() {
      adminPost("/admin/remove-balance", {
        identifier: document.getElementById("removeIdentifier").value.trim(),
        amount: document.getElementById("removeAmount").value,
        message: document.getElementById("removeMessage").value.trim()
      }, "removeMsg", "Balance removed successfully.");
    }

    function activateCard() {
      adminPost("/admin/card/activate", {
        identifier: document.getElementById("activateIdentifier").value.trim(),
        cardBalance: document.getElementById("activateBalance").value
      }, "activateMsg", "Card activated successfully.");
    }

    function deactivateCard() {
      adminPost("/admin/card/deactivate", {
        identifier: document.getElementById("deactivateIdentifier").value.trim()
      }, "deactivateMsg", "Card deactivated successfully.");
    }

    async function loadStats() {
      const r = await fetch(`${API}/admin/stats`, {
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getAdminToken()}`
        }
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("usersMsg", text);
        return;
      }

      const data = JSON.parse(text);

      document.getElementById("totalUsers").textContent = Number(data.totalUsers || 0);
      document.getElementById("totalBalance").textContent = formatMoney(data.totalBalance || 0);
      document.getElementById("totalTransactions").textContent = Number(data.totalTransactions || 0);
    }

    async function loadUsers() {
      const r = await fetch(`${API}/admin/users`, {
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getAdminToken()}`
        }
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("usersMsg", text);
        return;
      }

      const data = JSON.parse(text);
      const tbody = document.getElementById("usersTable");

      tbody.innerHTML = (data.users || []).map((u) => `
        <tr>
          <td>${u.username || ""}</td>
          <td>${u.email || ""}</td>
          <td>${u.role || ""}</td>
          <td>${formatMoney(u.balance || 0)}</td>
          <td>${u.cardActivated ? "Active" : "Inactive"}</td>
          <td>${formatMoney(u.cardBalance || 0)}</td>
        </tr>
      `).join("");
    }

    async function refreshAdminData() {
      await Promise.all([loadStats(), loadUsers()]);
    }
  </script>
</body>
</html>

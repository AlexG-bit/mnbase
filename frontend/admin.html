<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Admin</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }

    .container {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 13px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error {
      display: block;
      color: #991b1b;
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .18);
    }

    .msg.success {
      display: block;
      color: #166534;
      background: rgba(22, 163, 74, .08);
      border: 1px solid rgba(22, 163, 74, .18);
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="loginCard">
      <h1 style="margin-top:0;">MNBase Admin</h1>
      <p style="color:#64748b;">Login with your admin credentials to manage wallet funding and card activation.</p>

      <div class="field">
        <label for="adminIdentifier">Admin username or email</label>
        <input id="adminIdentifier" type="text" placeholder="admin or admin@mnbase.app" />
      </div>

      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" placeholder="Enter admin password" />
      </div>

      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div class="grid hidden" id="adminPanel">
      <div class="card">
        <h2 style="margin-top:0;">Fund wallet</h2>
        <div class="field">
          <label for="fundIdentifier">Username or Email</label>
          <input id="fundIdentifier" type="text" placeholder="Enter user identifier" />
        </div>

        <div class="field">
          <label for="fundAmount">Amount</label>
          <input id="fundAmount" type="number" placeholder="Enter amount" />
        </div>

        <button class="btn btn-primary" onclick="fundWallet()">Fund Wallet</button>
        <div id="fundMsg" class="msg"></div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">Activate card</h2>
        <div class="field">
          <label for="cardIdentifier">Username or Email</label>
          <input id="cardIdentifier" type="text" placeholder="Enter user identifier" />
        </div>

        <div class="field">
          <label for="cardBalance">Card Balance</label>
          <input id="cardBalance" type="number" placeholder="Enter opening card balance" />
        </div>

        <button class="btn btn-primary" onclick="activateCard()">Activate Card</button>
        <div id="cardMsg" class="msg"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function getToken() {
      return localStorage.getItem("mnbase_admin_token");
    }

    function saveToken(token) {
      localStorage.setItem("mnbase_admin_token", token);
    }

    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = ok ? "msg success" : "msg error";
    }

    async function adminLogin() {
      const identifier = document.getElementById("adminIdentifier").value.trim();
      const password = document.getElementById("adminPassword").value;

      try {
        const r = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identifier, password })
        });

        const text = await r.text();

        if (!r.ok) {
          showMsg("loginMsg", text);
          return;
        }

        const data = JSON.parse(text);
        saveToken(data.token || "");

        document.getElementById("loginCard").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
      } catch (err) {
        showMsg("loginMsg", `Failed to fetch: ${err.message}`);
      }
    }

    async function fundWallet() {
      const identifier = document.getElementById("fundIdentifier").value.trim();
      const amount = document.getElementById("fundAmount").value;

      try {
        const r = await fetch(`${API}/admin/fund`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getToken()}`
          },
          body: JSON.stringify({ identifier, amount })
        });

        const text = await r.text();
        if (!r.ok) {
          showMsg("fundMsg", text);
          return;
        }

        showMsg("fundMsg", text, true);
      } catch (err) {
        showMsg("fundMsg", `Failed to fetch: ${err.message}`);
      }
    }

    async function activateCard() {
      const identifier = document.getElementById("cardIdentifier").value.trim();
      const cardBalance = document.getElementById("cardBalance").value;

      try {
        const r = await fetch(`${API}/admin/card/activate`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getToken()}`
          },
          body: JSON.stringify({ identifier, cardBalance })
        });

        const text = await r.text();
        if (!r.ok) {
          showMsg("cardMsg", text);
          return;
        }

        showMsg("cardMsg", text, true);
      } catch (err) {
        showMsg("cardMsg", `Failed to fetch: ${err.message}`);
      }
    }
  </script>
</body>
</html>

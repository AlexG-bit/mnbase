<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNBase Admin</title>
  <style>
    :root {
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #1652f0;
      --blue-2: #2f6bff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(22,82,240,.08), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      color: var(--text);
    }
    .container {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 22px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 13px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-2)); color: white; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--line); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }
    .msg.error {
      display: block;
      color: #991b1b;
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .18);
    }
    .msg.success {
      display: block;
      color: #166534;
      background: rgba(22, 163, 74, .08);
      border: 1px solid rgba(22, 163, 74, .18);
    }

    .hidden { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="loginCard">
      <h1 style="margin-top:0;">MNBase Admin</h1>
      <p style="color:#64748b;">Professional admin session for user management, balance control, and card control.</p>

      <div class="field">
        <label for="adminIdentifier">Admin username or email</label>
        <input id="adminIdentifier" type="text" placeholder="admin or admin@mnbase.app" />
      </div>

      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" placeholder="Enter admin password" />
      </div>

      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="grid">
        <div class="card">
          <h2 style="margin-top:0;">Fund wallet</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="fundIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Amount</label>
            <input id="fundAmount" type="number" />
          </div>
          <button class="btn btn-primary" onclick="fundWallet()">Fund Wallet</button>
          <div id="fundMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Remove balance</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="removeIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Amount</label>
            <input id="removeAmount" type="number" />
          </div>
          <button class="btn btn-primary" onclick="removeBalance()">Remove Balance</button>
          <div id="removeMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Activate card</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="activateIdentifier" type="text" />
          </div>
          <div class="field">
            <label>Opening Card Balance</label>
            <input id="activateBalance" type="number" />
          </div>
          <button class="btn btn-primary" onclick="activateCard()">Activate Card</button>
          <div id="activateMsg" class="msg"></div>
        </div>

        <div class="card">
          <h2 style="margin-top:0;">Deactivate card</h2>
          <div class="field">
            <label>Username or Email</label>
            <input id="deactivateIdentifier" type="text" />
          </div>
          <button class="btn btn-primary" onclick="deactivateCard()">Deactivate Card</button>
          <div id="deactivateMsg" class="msg"></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h2 style="margin:0;">Users</h2>
          <button class="btn btn-secondary" onclick="loadUsers()">Refresh Users</button>
        </div>
        <div id="usersMsg" class="msg"></div>
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Balance</th>
              <th>Card</th>
              <th>Card Balance</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.mnbase.app/api";

    function saveAdminToken(token) {
      localStorage.setItem("mnbase_admin_token", token);
    }

    function getAdminToken() {
      return localStorage.getItem("mnbase_admin_token");
    }

    function showMsg(id, text, ok = false) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = ok ? "msg success" : "msg error";
    }

    async function adminLogin() {
      const identifier = document.getElementById("adminIdentifier").value.trim();
      const password = document.getElementById("adminPassword").value;

      const r = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier, password })
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("loginMsg", text);
        return;
      }

      const data = JSON.parse(text);
      saveAdminToken(data.token || "");

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");

      loadUsers();
    }

    async function adminPost(path, body, msgId, successText) {
      const r = await fetch(`${API}${path}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getAdminToken()}`
        },
        body: JSON.stringify(body)
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg(msgId, text);
        return;
      }

      showMsg(msgId, successText, true);
      loadUsers();
    }

    function fundWallet() {
      adminPost("/admin/fund", {
        identifier: document.getElementById("fundIdentifier").value.trim(),
        amount: document.getElementById("fundAmount").value
      }, "fundMsg", "Wallet funded successfully.");
    }

    function removeBalance() {
      adminPost("/admin/remove-balance", {
        identifier: document.getElementById("removeIdentifier").value.trim(),
        amount: document.getElementById("removeAmount").value
      }, "removeMsg", "Balance removed successfully.");
    }

    function activateCard() {
      adminPost("/admin/card/activate", {
        identifier: document.getElementById("activateIdentifier").value.trim(),
        cardBalance: document.getElementById("activateBalance").value
      }, "activateMsg", "Card activated successfully.");
    }

    function deactivateCard() {
      adminPost("/admin/card/deactivate", {
        identifier: document.getElementById("deactivateIdentifier").value.trim()
      }, "deactivateMsg", "Card deactivated successfully.");
    }

    async function loadUsers() {
      const r = await fetch(`${API}/admin/users`, {
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getAdminToken()}`
        }
      });

      const text = await r.text();

      if (!r.ok) {
        showMsg("usersMsg", text);
        return;
      }

      const data = JSON.parse(text);
      const tbody = document.getElementById("usersTable");

      tbody.innerHTML = (data.users || []).map((u) => `
        <tr>
          <td>${u.username || ""}</td>
          <td>${u.email || ""}</td>
          <td>${u.role || ""}</td>
          <td>$${Number(u.balance || 0).toFixed(2)}</td>
          <td>${u.cardActivated ? "Active" : "Inactive"}</td>
          <td>$${Number(u.cardBalance || 0).toFixed(2)}</td>
        </tr>
      `).join("");
    }
  </script>
</body>
</html>
